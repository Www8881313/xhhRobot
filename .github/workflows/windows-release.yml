name: Windows Release



on:

  workflow_dispatch:

  push:

    tags:

      - "v*"



jobs:

  build-windows:

    name: Build Windows setup

    runs-on: windows-latest



    steps:

      - name: Checkout

        uses: actions/checkout@v4



      - name: Setup MSYS2 MinGW

        uses: msys2/setup-msys2@v2

        with:

          msystem: UCRT64

          update: true

          install: mingw-w64-ucrt-x86_64-gcc



      - name: Add MinGW to PATH

        shell: pwsh

        run: echo "C:\msys64\ucrt64\bin" >> $env:GITHUB_PATH



      - name: Setup Go

        uses: actions/setup-go@v5

        with:

          go-version-file: go.mod

          check-latest: true

          cache: true



      - name: Build executables

        shell: pwsh

        run: |

          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force dist/windows | Out-Null

          $env:CGO_ENABLED = "1"

          $env:GOOS = "windows"

          $env:GOARCH = "amd64"

          $env:CC = "gcc"

          go mod download

          go test ./...

          go build -trimpath -ldflags "-s -w" -o dist/windows/Openxhh.exe .

          go build -trimpath -ldflags "-s -w -H=windowsgui" -o dist/windows/Openxhh-webui.exe ./cmd/webui



      - name: Install Inno Setup

        shell: pwsh

        run: choco install innosetup --no-progress -y



      - name: Build setup

        shell: pwsh

        run: |

          $ErrorActionPreference = "Stop"

          if ($env:GITHUB_REF_TYPE -eq "tag") {

            $env:OPENXHH_VERSION = $env:GITHUB_REF_NAME.TrimStart("v")

          } else {

            $env:OPENXHH_VERSION = "dev"

          }

          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer/windows/Openxhh.iss



      - name: Upload artifact

        uses: actions/upload-artifact@v4

        with:

          name: Openxhh-windows-x64

          path: |

            dist/windows/Openxhh.exe

            dist/windows/Openxhh-webui.exe

            dist/installer/Openxhh-Setup-x64.exe



      - name: Publish GitHub Release

        if: github.ref_type == 'tag'

        uses: softprops/action-gh-release@v2

        with:

          files: dist/installer/Openxhh-Setup-x64.exe
